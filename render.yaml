services:
  - type: web
    name: cobalt-telegram-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false  # Render deploy ke baad URL yahan dalna
      - key: DATABASE_URL
        fromDatabase:
          name: cobalt-bot-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: cobalt-bot-db
    databaseName: cobalt_bot
    user: cobalt_bot_user
    plan: free
